server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Rota 1: Auth Service
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        # Rota 2: O futuro Portfolio Service (Vamos apontar para a porta 8082)
        - id: portfolio-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/portfolio/**

jwt:
  secret: ${JWT_SECRET}
